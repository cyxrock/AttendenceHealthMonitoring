<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <main id="login-card">
        <header>
            <a href="index.html" class="back-link">← Kembali ke Beranda</a>
            <h1>Login Admin</h1>
            <p>Silakan masuk untuk akses dashboard</p>
        </header>

        <section>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Admin</label>
                    <input type="email" id="email" placeholder="admin@iot.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukan password" required>
                </div>

                <div class="form-group">
                    <button type="submit" id="login-button">Masuk Sistem</button>
                </div>

                <div class="form-group">
                    <p id="login-message"></p>
                </div>
            </form>
        </section>

        <footer>
            <p>&copy; 2026 PT. ANGKASA
Attendence & Health Monitoring. All Rights Reserved.</p>
        </footer>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
